name: CI Pipeline (Full Stack)

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - staging
          - production

jobs:
  backend:
    name: Backend — Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build backend (with tests)
        run: docker build --build-arg SKIP_TESTS=true -t commerce-platform-backend:ci ./backend

  frontend:
    name: Frontend — Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build frontend
        run: docker build -t commerce-platform-frontend:ci ./frontend

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Frontend — npm audit
        working-directory: frontend
        run: npm audit --audit-level=high || true

  verify:
    name: Verify
    runs-on: ubuntu-latest
    needs: [backend, frontend, security-scan]
    steps:
      - run: echo "All builds and scans passed for ${{ inputs.environment }}"
