# ===================================
# Commerce Platform - Core Configuration
# ===================================

spring.application.name=commerce-platform
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

# --- MongoDB ---
spring.data.mongodb.uri=${MONGODB_URI:mongodb://localhost:27017/commerce_platform}

# --- Redis (for order caching only) ---
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}
spring.data.redis.timeout=2000ms

# --- Jackson ---
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.default-property-inclusion=non_null

# --- Graceful Shutdown ---
server.port=${SERVER_PORT:8080}
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=30s
server.tomcat.connection-timeout=5s
server.tomcat.max-connections=200
server.tomcat.threads.max=100
server.tomcat.threads.min-spare=10

# ===================================
# Custom Application Properties
# ===================================

# --- JWT ---
app.jwt.secret=${JWT_SECRET:default-dev-secret-key-must-be-at-least-256-bits-long-for-hmac-sha256}
app.jwt.expiration-ms=${JWT_EXPIRATION:3600000}
app.jwt.refresh-expiration-ms=${JWT_REFRESH_EXPIRATION:86400000}

# --- CORS ---
app.cors.allowed-origins=${CORS_ORIGINS:http://localhost:5173,http://localhost:3000}

# --- Rate Limiting ---
app.rate-limit.requests-per-minute=${RATE_LIMIT_RPM:6000}

# --- Feature Flags ---
app.feature-flags.enable-channel-sync=${FF_CHANNEL_SYNC:true}
app.feature-flags.enable-audit-log=${FF_AUDIT_LOG:true}
app.feature-flags.enable-notifications=${FF_NOTIFICATIONS:false}

# --- Shutdown ---
app.shutdown.max-wait-seconds=${SHUTDOWN_MAX_WAIT:30}

# ===================================
# Actuator
# ===================================
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=when_authorized
management.endpoint.health.probes.enabled=true
management.health.mongo.enabled=true
management.health.redis.enabled=true

# ===================================
# Logging
# ===================================
logging.level.root=INFO
logging.level.com.crm.commerce.platform=DEBUG
logging.level.org.springframework.data.mongodb=INFO
logging.level.org.springframework.security=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] [%X{correlationId}] %-5level %logger{36} - %msg%n

# ===================================
# Resilience4j - Circuit Breaker
# ===================================
resilience4j.circuitbreaker.configs.default.sliding-window-size=10
resilience4j.circuitbreaker.configs.default.failure-rate-threshold=50
resilience4j.circuitbreaker.configs.default.wait-duration-in-open-state=30s
resilience4j.circuitbreaker.configs.default.permitted-number-of-calls-in-half-open-state=5
resilience4j.circuitbreaker.configs.default.register-health-indicator=true
resilience4j.circuitbreaker.instances.amazonChannel.base-config=default
resilience4j.circuitbreaker.instances.blinkitChannel.base-config=default
resilience4j.circuitbreaker.instances.websiteChannel.base-config=default

# ===================================
# Resilience4j - Retry
# ===================================
resilience4j.retry.configs.default.max-attempts=3
resilience4j.retry.configs.default.wait-duration=1s
resilience4j.retry.configs.default.enable-exponential-backoff=true
resilience4j.retry.configs.default.exponential-backoff-multiplier=2
resilience4j.retry.instances.amazonChannel.base-config=default
resilience4j.retry.instances.blinkitChannel.base-config=default
resilience4j.retry.instances.websiteChannel.base-config=default

# ===================================
# SpringDoc / Swagger
# ===================================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui
springdoc.swagger-ui.operations-sorter=method
springdoc.swagger-ui.tags-sorter=alpha
