# ===================================
# Production Profile
# ===================================
spring.data.mongodb.uri=${MONGODB_URI}
spring.data.redis.password=${REDIS_PASSWORD}

logging.level.root=WARN
logging.level.com.crm.commerce.platform=INFO
logging.pattern.console={"timestamp":"%d{yyyy-MM-dd HH:mm:ss.SSS}","thread":"%thread","correlationId":"%X{correlationId}","level":"%-5level","logger":"%logger{36}","message":"%msg"}%n

app.jwt.secret=${JWT_SECRET}
app.rate-limit.requests-per-minute=30
