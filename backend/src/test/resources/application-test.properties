# Test profile — uses embedded MongoDB via flapdoodle, no Redis
de.flapdoodle.mongodb.embedded.version=7.0.0

# Disable Redis
spring.data.redis.host=localhost
spring.data.redis.port=0
spring.cache.type=none
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration,org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration

# Actuator
management.health.redis.enabled=false

# JWT
app.jwt.secret=integration-test-secret-key-that-is-at-least-32-characters-long
app.jwt.expiration-ms=3600000
app.jwt.refresh-expiration-ms=86400000

# CORS
app.cors.allowed-origins=http://localhost:5173

# Rate limit
app.rate-limit.requests-per-minute=1000

# Feature flags
app.feature-flags.enable-channel-sync=true
app.feature-flags.enable-audit-log=true
app.feature-flags.enable-notifications=false

# Shutdown
app.shutdown.max-wait-seconds=5

# Logging
logging.level.root=WARN
logging.level.com.crm.commerce.platform=INFO

# MongoDB auditing
spring.data.mongodb.auto-index-creation=true
